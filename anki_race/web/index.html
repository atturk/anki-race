<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="css/race.css">
</head>
<body>
    <div class="anki-race-bar-inner" id="anki-race-container">
        <!-- Track and Cars (Minimalist: HUD Removed) -->
        <div class="race-track-container">
            <div class="race-road" id="race-road-strip">
                <!-- Lanes and markings (CSS handled) -->
                <div class="finish-line"></div>
                
                <!-- CPU Car -->
                <div class="car-wrapper" id="car-cpu-wrapper" style="left: 0%;">
                    <img class="car-img" id="car-cpu-img" src="" alt="CPU" style="display: none;" />
                    <span class="car-emoji" id="car-cpu-emoji" style="display: none;"></span>
                </div>
                
                <!-- User Car -->
                <div class="car-wrapper" id="car-user-wrapper" style="left: 0%;">
                    <img class="car-img" id="car-user-img" src="" alt="USER" style="display: none;" />
                    <span class="car-emoji" id="car-user-emoji" style="display: none;"></span>
                </div>
            </div>
        </div>
        
        <!-- Minimize Tab (arrow starts pointing up) -->
        <div class="minimize-tab" id="minimize-tab">
            <div class="minimize-arrow"></div>
        </div>
    </div>

    <script src="js/race.js"></script>
</body>
</html>
